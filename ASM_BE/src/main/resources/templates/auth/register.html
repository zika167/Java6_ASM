<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout/layout}">
<head>
    <title>Register | Precision Digital</title>
</head>
<body>
<div layout:fragment="content">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-on-surface">
                    Create your account
                </h2>
                <p class="mt-2 text-center text-sm text-on-surface-variant">
                    Or
                    <a th:href="@{/login}" class="font-medium text-primary hover:text-primary-container">
                        sign in to existing account
                    </a>
                </p>
            </div>
            
            <div class="bg-surface-container-lowest rounded-xl shadow-lg p-8" id="registerForm">
                <div v-if="errorMessage" class="mb-4 p-4 bg-error-container text-on-error-container rounded-lg">
                    {{ errorMessage }}
                </div>
                
                <div v-if="successMessage" class="mb-4 p-4 bg-tertiary-container text-on-tertiary-container rounded-lg">
                    {{ successMessage }}
                </div>
                
                <form class="space-y-6" @submit.prevent="register">
                    <div>
                        <label for="username" class="block text-sm font-medium text-on-surface">
                            Username
                        </label>
                        <input id="username" 
                               name="username" 
                               type="text" 
                               required 
                               v-model="registerData.username"
                               class="mt-1 block w-full px-3 py-2 border border-outline-variant rounded-lg shadow-sm placeholder-on-surface-variant focus:outline-none focus:ring-primary focus:border-primary">
                    </div>
                    
                    <div>
                        <label for="fullname" class="block text-sm font-medium text-on-surface">
                            Full Name
                        </label>
                        <input id="fullname" 
                               name="fullname" 
                               type="text" 
                               required 
                               v-model="registerData.fullname"
                               class="mt-1 block w-full px-3 py-2 border border-outline-variant rounded-lg shadow-sm placeholder-on-surface-variant focus:outline-none focus:ring-primary focus:border-primary">
                    </div>
                    
                    <div>
                        <label for="email" class="block text-sm font-medium text-on-surface">
                            Email Address
                        </label>
                        <input id="email" 
                               name="email" 
                               type="email" 
                               required 
                               v-model="registerData.email"
                               class="mt-1 block w-full px-3 py-2 border border-outline-variant rounded-lg shadow-sm placeholder-on-surface-variant focus:outline-none focus:ring-primary focus:border-primary">
                    </div>
                    
                    <div>
                        <label for="phone" class="block text-sm font-medium text-on-surface">
                            Phone Number
                        </label>
                        <input id="phone" 
                               name="phone" 
                               type="tel" 
                               v-model="registerData.phone"
                               class="mt-1 block w-full px-3 py-2 border border-outline-variant rounded-lg shadow-sm placeholder-on-surface-variant focus:outline-none focus:ring-primary focus:border-primary">
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-on-surface">
                            Password
                        </label>
                        <input id="password" 
                               name="password" 
                               type="password" 
                               required 
                               v-model="registerData.password"
                               class="mt-1 block w-full px-3 py-2 border border-outline-variant rounded-lg shadow-sm placeholder-on-surface-variant focus:outline-none focus:ring-primary focus:border-primary">
                    </div>
                    
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-on-surface">
                            Confirm Password
                        </label>
                        <input id="confirmPassword" 
                               name="confirmPassword" 
                               type="password" 
                               required 
                               v-model="registerData.confirmPassword"
                               class="mt-1 block w-full px-3 py-2 border border-outline-variant rounded-lg shadow-sm placeholder-on-surface-variant focus:outline-none focus:ring-primary focus:border-primary">
                    </div>
                    
                    <div class="flex items-center">
                        <input id="terms" 
                               name="terms" 
                               type="checkbox" 
                               required
                               class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded">
                        <label for="terms" class="ml-2 block text-sm text-on-surface">
                            I agree to the 
                            <a href="#" class="text-primary hover:text-primary-container">Terms and Conditions</a>
                        </label>
                    </div>
                    
                    <div>
                        <button type="submit" 
                                :disabled="loading"
                                class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50">
                            <span v-if="!loading">Create Account</span>
                            <span v-else>Creating Account...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    registerData: {
                        username: '',
                        fullname: '',
                        email: '',
                        phone: '',
                        password: '',
                        confirmPassword: ''
                    },
                    loading: false,
                    errorMessage: '',
                    successMessage: ''
                }
            },
            methods: {
                async register() {
                    this.loading = true;
                    this.errorMessage = '';
                    this.successMessage = '';
                    
                    // Client-side validation
                    if (this.registerData.password !== this.registerData.confirmPassword) {
                        this.errorMessage = 'Passwords do not match';
                        this.loading = false;
                        return;
                    }
                    
                    try {
                        const response = await axios.post('/api/v1/auth/register', this.registerData);
                        
                        if (response.data.status === 200) {
                            this.successMessage = 'Account created successfully! Redirecting to login...';
                            
                            // Redirect to login after 2 seconds
                            setTimeout(() => {
                                window.location.href = '/login';
                            }, 2000);
                        }
                    } catch (error) {
                        if (error.response?.data?.message) {
                            this.errorMessage = error.response.data.message;
                        } else {
                            this.errorMessage = 'Registration failed. Please try again.';
                        }
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#registerForm');
    </script>
</div>
</body>
</html>
