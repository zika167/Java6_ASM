<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - ShopMart</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <style>
        [v-cloak] { display: none; }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- HEADER -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a th:href="@{/}" class="flex items-center space-x-2 text-2xl font-bold text-blue-600 hover:text-blue-700 transition">
                    <i class="fas fa-shopping-bag"></i>
                    <span>ShopMart</span>
                </a>
                
                <div class="hidden md:flex flex-1 max-w-2xl mx-8">
                    <div class="relative w-full">
                        <input 
                            type="text" 
                            placeholder="Tìm kiếm sản phẩm..." 
                            class="w-full px-4 py-2 pr-12 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                        <button class="absolute right-0 top-0 h-full px-4 bg-blue-600 text-white rounded-r-lg hover:bg-blue-700 transition">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center space-x-6">
                    <a th:href="@{/cart}" class="relative text-gray-700 hover:text-blue-600 transition">
                        <i class="fas fa-shopping-cart text-2xl"></i>
                        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span>
                    </a>
                    
                    <div sec:authorize="isAuthenticated()" class="relative group">
                        <button class="flex items-center space-x-2 text-gray-700 hover:text-blue-600 transition">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden lg:block" sec:authentication="name">User</span>
                        </button>
                    </div>
                    
                    <div sec:authorize="!isAuthenticated()" class="flex items-center space-x-3">
                        <a th:href="@{/login}" class="px-4 py-2 text-blue-600 hover:text-blue-700 font-medium transition">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </nav>
        
        <div class="bg-blue-600 text-white">
            <div class="container mx-auto px-4">
                <ul class="flex space-x-8 py-3 overflow-x-auto">
                    <li><a th:href="@{/}" class="hover:text-blue-200 transition whitespace-nowrap">Trang chủ</a></li>
                    <li><a th:href="@{/products}" class="hover:text-blue-200 transition whitespace-nowrap font-semibold">Sản phẩm</a></li>
                    <li><a th:href="@{/products?category=electronics}" class="hover:text-blue-200 transition whitespace-nowrap">Điện tử</a></li>
                    <li><a th:href="@{/products?category=fashion}" class="hover:text-blue-200 transition whitespace-nowrap">Thời trang</a></li>
                    <li><a th:href="@{/products?category=home}" class="hover:text-blue-200 transition whitespace-nowrap">Nhà cửa</a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container mx-auto px-4 py-8">
        
        <!-- Breadcrumb -->
        <div class="flex items-center space-x-2 text-sm text-gray-600 mb-6">
            <a th:href="@{/}" class="hover:text-blue-600">Trang chủ</a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-gray-900 font-medium">Sản phẩm</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <!-- Sidebar Filters -->
            <aside class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-sm p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-gray-900 mb-6">
                        <i class="fas fa-filter text-blue-600 mr-2"></i>
                        Bộ lọc
                    </h2>
                    
                    <!-- Category Filter -->
                    <div class="mb-6">
                        <h3 class="font-semibold text-gray-900 mb-3">Danh mục</h3>
                        <div class="space-y-2">
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-gray-700">Điện tử</span>
                                <span class="ml-auto text-gray-400 text-sm">(24)</span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-gray-700">Thời trang</span>
                                <span class="ml-auto text-gray-400 text-sm">(18)</span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-gray-700">Nhà cửa</span>
                                <span class="ml-auto text-gray-400 text-sm">(12)</span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-gray-700">Thể thao</span>
                                <span class="ml-auto text-gray-400 text-sm">(8)</span>
                            </label>
                        </div>
                    </div>

                    <hr class="my-6">

                    <!-- Price Filter -->
                    <div class="mb-6">
                        <h3 class="font-semibold text-gray-900 mb-3">Khoảng giá</h3>
                        <div class="space-y-2">
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="radio" name="price" class="w-4 h-4 text-blue-600">
                                <span class="ml-3 text-gray-700">Dưới 1 triệu</span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="radio" name="price" class="w-4 h-4 text-blue-600">
                                <span class="ml-3 text-gray-700">1 - 5 triệu</span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="radio" name="price" class="w-4 h-4 text-blue-600">
                                <span class="ml-3 text-gray-700">5 - 10 triệu</span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="radio" name="price" class="w-4 h-4 text-blue-600">
                                <span class="ml-3 text-gray-700">Trên 10 triệu</span>
                            </label>
                        </div>
                    </div>

                    <hr class="my-6">

                    <!-- Rating Filter -->
                    <div class="mb-6">
                        <h3 class="font-semibold text-gray-900 mb-3">Đánh giá</h3>
                        <div class="space-y-2">
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-yellow-400">
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                </span>
                            </label>
                            <label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded">
                                <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-yellow-400">
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="far fa-star"></i>
                                    <span class="text-gray-600 ml-1">trở lên</span>
                                </span>
                            </label>
                        </div>
                    </div>

                    <button class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                        <i class="fas fa-check mr-2"></i>
                        Áp dụng
                    </button>
                </div>
            </aside>

            <!-- Products Grid -->
            <div class="lg:col-span-3">
                
                <!-- Toolbar -->
                <div class="bg-white rounded-lg shadow-sm p-4 mb-6 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-600">Hiển thị <strong>1-20</strong> trong <strong>156</strong> sản phẩm</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <label class="text-gray-600">Sắp xếp:</label>
                        <select class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option>Mới nhất</option>
                            <option>Giá thấp đến cao</option>
                            <option>Giá cao đến thấp</option>
                            <option>Bán chạy</option>
                        </select>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    
                    <!-- Product Card (Repeat for each product) -->
                    <div th:each="i : ${#numbers.sequence(1, 20)}" class="bg-white rounded-lg shadow-sm hover:shadow-lg transition hover-lift overflow-hidden">
                        <a th:href="@{/products/{id}(id=${i})}" class="block">
                            <div class="relative">
                                <img th:src="'https://via.placeholder.com/300x300/E5E7EB/6B7280?text=Product+' + ${i}" 
                                     alt="Product" 
                                     class="w-full h-48 object-cover">
                                <span th:if="${i % 3 == 0}" class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded">
                                    -30%
                                </span>
                                <span th:if="${i % 5 == 0}" class="absolute top-2 left-2 bg-blue-500 text-white text-xs px-2 py-1 rounded">
                                    Mới
                                </span>
                            </div>
                            <div class="p-4">
                                <h3 class="text-sm text-gray-800 mb-2 line-clamp-2 h-10">
                                    Sản phẩm chất lượng cao số <span th:text="${i}"></span>
                                </h3>
                                <div class="flex items-center space-x-2 mb-2">
                                    <span class="text-red-600 font-bold text-lg">1.990.000₫</span>
                                    <span th:if="${i % 3 == 0}" class="text-gray-400 text-sm line-through">2.990.000₫</span>
                                </div>
                                <div class="flex items-center text-xs text-gray-500">
                                    <i class="fas fa-star text-yellow-400"></i>
                                    <span class="ml-1">4.8 (120)</span>
                                    <span class="ml-auto">Đã bán 500</span>
                                </div>
                            </div>
                        </a>
                    </div>

                </div>

                <!-- Pagination -->
                <div class="mt-8 flex justify-center">
                    <nav class="flex items-center space-x-2">
                        <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg">1</button>
                        <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">2</button>
                        <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">3</button>
                        <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">4</button>
                        <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">5</button>
                        <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </nav>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-gray-900 text-gray-300 mt-16">
        <div class="container mx-auto px-4 py-8 text-center">
            <p class="text-sm">&copy; 2024 ShopMart. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
