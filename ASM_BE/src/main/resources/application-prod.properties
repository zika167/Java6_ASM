# PRODUCTION CONFIGURATION
spring.application.name=ASM_BE

# DATABASE CONFIGURATION (MARIADB) - PRODUCTION
# Using the same Docker MariaDB configuration but with production settings
spring.datasource.url=jdbc:mariadb://localhost:3306/java6_estore?createDatabaseIfNotExist=false&characterEncoding=UTF-8
spring.datasource.username=estore_user
spring.datasource.password=estore_password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Connection Pool Configuration for Production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# JPA / HIBERNATE CONFIGURATION - PRODUCTION
# IMPORTANT: Use 'validate' in production to prevent accidental schema changes
spring.jpa.hibernate.ddl-auto=validate
# Disable SQL logging in production for performance and security
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Enable SQL statistics for monitoring (optional)
spring.jpa.properties.hibernate.generate_statistics=false

# Hibernate Dialect for MariaDB
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# SERVER CONFIGURATION - PRODUCTION
server.port=8080
# Enable compression for better performance
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Session Configuration - Production Security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# THYMELEAF CONFIGURATION - PRODUCTION
# Enable caching in production for better performance
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# LOGGING CONFIGURATION - PRODUCTION
# Root logging level
logging.level.root=WARN
# Application logging
logging.level.poly.edu.asm_be=INFO
# Spring framework logging
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
# Database logging - disabled for production
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# Third-party libraries
logging.level.com.zaxxer.hikari=WARN

# File logging configuration
logging.file.name=logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# APPLICATION CONFIGURATION - PRODUCTION
app.checkout.shipping-fee=12.50
app.checkout.tax-rate=0.08
app.checkout.free-shipping-threshold=500.00

# SWAGGER/OPENAPI CONFIGURATION - PRODUCTION
# Disable Swagger UI in production for security (uncomment if needed)
# springdoc.swagger-ui.enabled=false
# springdoc.api-docs.enabled=false

# ACTUATOR CONFIGURATION - PRODUCTION MONITORING
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
management.security.enabled=true

# SECURITY CONFIGURATION - PRODUCTION
# Enable HTTPS redirect (uncomment when SSL is configured)
# server.ssl.enabled=true
# security.require-ssl=true

# PERFORMANCE CONFIGURATION
spring.mvc.async.request-timeout=30000
spring.transaction.default-timeout=30

# ERROR HANDLING - PRODUCTION
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# INTERNATIONALIZATION
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

# STATIC RESOURCES - PRODUCTION CACHING
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**