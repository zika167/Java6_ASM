spring.application.name=ASM_BE

# Database
spring.datasource.url=jdbc:mariadb://localhost:3306/java6_estore?createDatabaseIfNotExist=true
spring.datasource.username=estore_user
spring.datasource.password=estore_password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# SQL Script Configuration
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=false

# Server
server.port=8080
server.servlet.session.timeout=30m

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.poly.edu.asm_be=INFO

# Checkout Configuration
app.checkout.shipping-fee=5.00
app.checkout.tax-rate=0.10
app.checkout.free-shipping-threshold=50.00