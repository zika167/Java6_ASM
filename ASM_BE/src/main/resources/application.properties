spring.application.name=ASM_BE

# DATABASE CONFIGURATION (MARIADB)
# URL kết nối tới database trong Docker (localhost:3306)
spring.datasource.url=jdbc:mariadb://localhost:3306/java6_estore?createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=estore_user
spring.datasource.password=estore_password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / HIBERNATE CONFIGURATION
# Tự động cập nhật cấu trúc bảng dựa trên Entity (update: tạo mới nếu chưa có, cập nhật nếu có thay đổi)
# Lưu ý: Khi lên Production (thực tế) thì nên đổi thành 'validate' hoặc 'none'
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Khai báo Dialect cho MariaDB
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# SERVER CONFIGURATION
server.port=8080

# THYMELEAF CONFIGURATION
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Configuration
server.port=8080
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.poly.edu.asm_be=DEBUG

# Application Configuration
app.checkout.shipping-fee=12.50
app.checkout.tax-rate=0.08
app.checkout.free-shipping-threshold=500.00

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true